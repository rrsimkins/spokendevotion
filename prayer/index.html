<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spoken Devotion • Prayer</title>
    <meta name="description" content="Written and spoken prayers from Spoken Devotion — listen, read, and share.">
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" href="/images/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="/images/logo.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Spoken Devotion">
    <meta property="og:title" content="Spoken Devotion • Prayer">
    <meta property="og:description" content="Written and spoken prayers from Spoken Devotion — listen, read, and share.">
    <meta property="og:url" content="https://spokendevotion.com/prayer/">
    <meta property="og:image" content="https://spokendevotion.com/images/prayer.png">
    <meta name="twitter:card" content="summary_large_image">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/partials/site.css?v=12">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;500;600&display=swap');
    </style>
</head>
<body class="bg-zinc-950 text-white overflow-x-hidden">
    <div id="nav-root"></div>

    <section class="page-banner page-banner--standard" data-banner="/images/prayer.png" data-fallback="prayer-bg">
        <div class="page-banner__fallback"></div>
        <div class="page-banner__image"></div>
        <div class="page-banner__overlay"></div>
        <div class="page-banner__content max-w-5xl mx-auto">
            <h1 class="font-semibold tracking-tighter heading-font leading-tight text-amber-300">
                Prayers that Reach the Heart of God
            </h1>
            <p class="text-white/80 max-w-3xl mx-auto">
                Written prayers, spoken audio prayers, and intercession that build emotional strength and draw us closer to the Father through Christ.
            </p>
        </div>
    </section>

    <div class="max-w-5xl mx-auto px-6 py-12">
            <div class="audio-card p-8 md:p-10 mb-10" id="featured-item">
                <div class="mb-6">
                    <h3 class="text-3xl font-semibold mb-1">Prayer for Family</h3>
                </div>
                <audio controls controlsList="nodownload" class="w-full mb-6">
                    <source src="prayer_for_family.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
                <div class="flex flex-wrap gap-3">
                    <button onclick="showPrayer('family-prayer')"
                            class="inline-flex items-center gap-x-2 px-6 py-3 bg-amber-400 hover:bg-amber-300 text-zinc-950 font-medium rounded-2xl text-sm transition-all">
                        <i class="fa-solid fa-book-open"></i> Show Prayer
                    </button>
                    <button onclick="shareAudio('prayer_for_family.mp3', 'Prayer for Family')"
                            class="inline-flex items-center gap-x-2 px-5 py-3 text-sm text-amber-400 hover:text-amber-300 border border-amber-400/40 hover:bg-amber-400/10 rounded-2xl transition-all">
                        <i class="fa-solid fa-share-alt"></i> Share
                    </button>
                </div>
            </div>

            <div class="audio-card audio-card--secondary p-8 md:p-10">
                <div class="mb-6">
                    <h3 class="text-3xl font-semibold mb-1">Prayer of Repentance</h3>
                </div>
                <audio controls controlsList="nodownload" class="w-full mb-6">
                    <source src="prayer_of_repentance.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
                <div class="flex flex-wrap gap-3">
                    <button onclick="showPrayer('repentance-prayer')"
                            class="inline-flex items-center gap-x-2 px-6 py-3 bg-amber-400 hover:bg-amber-300 text-zinc-950 font-medium rounded-2xl text-sm transition-all">
                        <i class="fa-solid fa-book-open"></i> Show Prayer
                    </button>
                    <button onclick="shareAudio('prayer_of_repentance.mp3', 'Prayer of Repentance')"
                            class="inline-flex items-center gap-x-2 px-5 py-3 text-sm text-amber-400 hover:text-amber-300 border border-amber-400/40 hover:bg-amber-400/10 rounded-2xl transition-all">
                        <i class="fa-solid fa-share-alt"></i> Share
                    </button>
                </div>
            </div>

            <p class="text-center text-amber-300 italic mt-16 text-lg">
                More prayers coming soon — God willing.
            </p>
    </div>

    <div id="prayer-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
        <div class="modal-content">
            <div class="p-6 border-b border-amber-400/30 flex justify-between items-center">
                <div class="text-center flex-1">
                    <h3 id="modal-title" class="text-2xl font-semibold"></h3>
                </div>
                <button type="button" onclick="closeModal()" class="text-3xl leading-none hover:text-amber-400" aria-label="Close">&times;</button>
            </div>
            <div id="modal-body" class="p-8 md:p-10 max-h-[65vh] overflow-auto text-white/90 leading-relaxed text-lg whitespace-pre-wrap text-center"></div>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fa-solid fa-check-circle"></i>
        <span id="toast-text">Link copied to clipboard!</span>
    </div>

    <div id="footer-root"></div>

    <script src="/partials/site.js?v=12"></script>
    <script>
        let prayersCache = {};

        async function showPrayer(id) {
            const modal = document.getElementById('prayer-modal');
            const body = document.getElementById('modal-body');
            const titleEl = document.getElementById('modal-title');

            try {
                prayersCache = await fetchJsonData('prayer.json', prayersCache);
                const prayer = prayersCache[id];
                if (!prayer || !prayer.title) {
                    throw new Error('Prayer not found');
                }
                titleEl.textContent = prayer.title;
                body.textContent = prayer.text || '';
                openContentModal(modal);
            } catch (err) {
                console.error(err);
                titleEl.textContent = 'Prayer';
                body.textContent = 'Error loading prayer. Please try again.';
                openContentModal(modal);
            }
        }

        function closeModal() {
            closeContentModal(document.getElementById('prayer-modal'));
        }

        document.getElementById('prayer-modal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('prayer-modal');
                if (modal.style.display === 'flex') closeModal();
            }
        });
    </script>
</body>
</html>
